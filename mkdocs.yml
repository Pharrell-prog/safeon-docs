site_name: Safeon Engineering Docs
site_description: Engineering documentation for Safeon pilots and products
site_url: https://pharrell-prog.github.io/safeon-docs/

docs_dir: docs_src

theme:
  name: material
  logo: assets/safeon-logo.svg
  favicon: assets/safeon-favicon.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tracking
    - toc.follow
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - PDS:
      - Safeon-Oxman-SFT-001: pds/safeon-oxman-sft-001.md


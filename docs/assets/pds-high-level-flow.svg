<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1f33"/>
      <stop offset="1" stop-color="#0a2f55"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title{font:700 44px Calibri,Segoe UI,Arial,sans-serif; fill:#ffffff; letter-spacing:0.3px;}
      .stepTitle{font:700 22px Calibri,Segoe UI,Arial,sans-serif; fill:#ffffff;}
      .stepSub{font:400 18px Calibri,Segoe UI,Arial,sans-serif; fill:#d6e4ff;}
      .hint{font:700 16px Calibri,Segoe UI,Arial,sans-serif; fill:#93c5fd; text-transform:uppercase; letter-spacing:1.2px;}
      .ring{fill:rgba(255,255,255,0.02); stroke:#9bd3ff; stroke-width:3;}
      .ring2{fill:none; stroke:rgba(155,211,255,0.22); stroke-width:14;}
      .node{filter:url(#softShadow);}
      .iconStroke{stroke:#e7f2ff; stroke-width:4; stroke-linecap:round; stroke-linejoin:round; fill:none;}
      .iconFill{fill:#e7f2ff;}
      .arrow{stroke:#62b7ff; stroke-width:4; fill:none; stroke-linecap:round;}
      .dot{fill:#62b7ff;}
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="520" fill="url(#bg)"/>

  <text x="800" y="72" text-anchor="middle" class="title">High-Level Workflow (Pilot)</text>

  <path d="M145 212 H1455" class="arrow" opacity="0.55"/>
  <circle cx="145" cy="212" r="5" class="dot" opacity="0.8"/>
  <circle cx="1455" cy="212" r="5" class="dot" opacity="0.8"/>

  <g class="node" transform="translate(160,150)">
    <circle cx="0" cy="0" r="88" class="ring2"/>
    <circle cx="0" cy="0" r="78" class="ring"/>
    <g transform="translate(-24,-22)">
      <path class="iconStroke" d="M14 6 h36 a6 6 0 0 1 6 6 v14 a10 10 0 0 1 -10 10 h-20 a12 12 0 0 0 -12 12 v2"/>
      <path class="iconStroke" d="M14 6 v22 a8 8 0 0 0 8 8 h22"/>
      <circle class="iconFill" cx="50" cy="14" r="3.5"/>
      <path class="iconStroke" d="M18 48 h36"/>
    </g>
  </g>
  <text x="160" y="120" text-anchor="middle" class="hint">Retail Environment</text>
  <text x="160" y="320" text-anchor="middle" class="stepTitle">Shelf geofence</text>
  <text x="160" y="350" text-anchor="middle" class="stepSub">Sew-in RFID tag attached</text>

  <path d="M260 212 H360" class="arrow"/>
  <path d="M360 212 l-16 -10 M360 212 l-16 10" class="arrow"/>

  <g class="node" transform="translate(420,150)">
    <circle cx="0" cy="0" r="88" class="ring2"/>
    <circle cx="0" cy="0" r="78" class="ring"/>
    <g transform="translate(-26,-30)">
      <path class="iconStroke" d="M10 64 V10 h34 v54"/>
      <path class="iconStroke" d="M44 10 h10 v54 h-10"/>
      <circle class="iconFill" cx="38" cy="36" r="3"/>
      <path d="M64 18 a16 16 0 1 1 0.1 0" fill="rgba(255,80,80,0.25)" stroke="#ff6b6b" stroke-width="3" filter="url(#glow)"/>
      <path class="iconStroke" d="M64 10 v16"/>
      <circle class="iconFill" cx="64" cy="34" r="2.8"/>
    </g>
  </g>
  <text x="420" y="120" text-anchor="middle" class="hint">Exit Threshold</text>
  <text x="420" y="320" text-anchor="middle" class="stepTitle">RFID door reader</text>
  <text x="420" y="350" text-anchor="middle" class="stepSub">Unauthorized exit triggers scan</text>

  <path d="M520 212 H620" class="arrow"/>
  <path d="M620 212 l-16 -10 M620 212 l-16 10" class="arrow"/>

  <g class="node" transform="translate(680,150)">
    <circle cx="0" cy="0" r="88" class="ring2"/>
    <circle cx="0" cy="0" r="78" class="ring"/>
    <g transform="translate(-40,-20)">
      <path class="iconStroke" d="M24 50 h46 a14 14 0 0 0 2 -28 a18 18 0 0 0 -34 -6 a13 13 0 0 0 -14 34"/>
      <path class="iconStroke" d="M38 46 v-18"/>
      <path class="iconStroke" d="M52 46 v-22"/>
      <path class="iconStroke" d="M66 46 v-14"/>
    </g>
    <g transform="translate(48,44)">
      <circle cx="0" cy="0" r="18" fill="rgba(98,183,255,0.18)" stroke="#62b7ff" stroke-width="3" filter="url(#glow)"/>
      <path class="iconStroke" d="M-6 0 h12"/>
      <path class="iconStroke" d="M0 -6 v12"/>
    </g>
  </g>
  <text x="680" y="120" text-anchor="middle" class="hint">Cloud / Backend</text>
  <text x="680" y="320" text-anchor="middle" class="stepTitle">Automated evidence</text>
  <text x="680" y="350" text-anchor="middle" class="stepSub">Theft report + optional CCTV</text>

  <path d="M780 212 H880" class="arrow"/>
  <path d="M880 212 l-16 -10 M880 212 l-16 10" class="arrow"/>

  <g class="node" transform="translate(940,150)">
    <circle cx="0" cy="0" r="88" class="ring2"/>
    <circle cx="0" cy="0" r="78" class="ring"/>
    <g transform="translate(-28,-14)">
      <path class="iconStroke" d="M12 44 a20 20 0 0 0 0 -28"/>
      <path class="iconStroke" d="M52 16 a20 20 0 0 1 0 28"/>
      <path class="iconStroke" d="M22 38 a12 12 0 0 0 0 -16"/>
      <path class="iconStroke" d="M42 22 a12 12 0 0 1 0 16"/>
      <circle class="iconFill" cx="32" cy="30" r="5.2"/>
    </g>
  </g>
  <text x="940" y="120" text-anchor="middle" class="hint">Out of Store</text>
  <text x="940" y="320" text-anchor="middle" class="stepTitle">Active telemetry</text>
  <text x="940" y="350" text-anchor="middle" class="stepSub">Cellular/RF uplink outside geofence</text>

  <path d="M1040 212 H1140" class="arrow"/>
  <path d="M1140 212 l-16 -10 M1140 212 l-16 10" class="arrow"/>

  <g class="node" transform="translate(1200,150)">
    <circle cx="0" cy="0" r="88" class="ring2"/>
    <circle cx="0" cy="0" r="78" class="ring"/>
    <g transform="translate(-36,-34)">
      <path class="iconStroke" d="M10 10 h52 v52 h-52 z"/>
      <path class="iconStroke" d="M10 26 h52"/>
      <path class="iconStroke" d="M10 42 h52"/>
      <path class="iconStroke" d="M26 10 v52"/>
      <path class="iconStroke" d="M42 10 v52"/>
      <path class="iconStroke" d="M36 38 c0 10 -10 18 -10 18 s-10 -8 -10 -18 a10 10 0 0 1 20 0z"/>
      <circle class="iconFill" cx="26" cy="38" r="3"/>
    </g>
  </g>
  <text x="1200" y="120" text-anchor="middle" class="hint">Tracking</text>
  <text x="1200" y="320" text-anchor="middle" class="stepTitle">Geofencing map</text>
  <text x="1200" y="350" text-anchor="middle" class="stepSub">Real-time lat/long updates</text>

  <text x="800" y="486" text-anchor="middle" class="stepSub" opacity="0.85">
    Pilot focus: door portal scan + backend evidence + active telemetry outside retail geofence
  </text>
</svg>

